services:
  rag-app:
    build: .
    container_name: medical-rag-saas
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./faiss_index:/app/faiss_index
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/admin/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
